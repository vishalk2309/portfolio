# Render Blueprint for the portfolio static site.
#
# The `rewrite` route is the important bit: it makes client-side routes like
# /admin serve index.html instead of returning "Not Found", so React Router
# can handle them.
#
# IMPORTANT: render.yaml only takes effect if this service is managed by a
# Render *Blueprint*. If your Static Site was created manually in the dashboard,
# this file is ignored — in that case add the same rule in the dashboard under
# "Redirects/Rewrites":  Source: /*   Destination: /index.html   Action: Rewrite
services:
  - type: web
    name: portfolio
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # These are Supabase's PUBLIC keys (read-only via Row Level Security),
      # so they are safe to commit and expose in the browser bundle.
      - key: VITE_SUPABASE_URL
        value: https://lvglryvlvfixwueujbxr.supabase.co
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        value: sb_publishable_qVsvm_0dMLMF1HgCk8b6Hw_DjwMKyn2
