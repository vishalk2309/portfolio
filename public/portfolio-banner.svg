<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0b12"/>
      <stop offset="1" stop-color="#141428"/>
    </linearGradient>
    <!-- AI accent gradient -->
    <linearGradient id="ai" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#4f46e5" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.035">
    <path d="M0 90H1200M0 180H1200M0 270H1200M0 360H1200M0 450H1200M0 540H1200"/>
    <path d="M120 0V630M240 0V630M360 0V630M480 0V630M600 0V630M720 0V630M840 0V630M960 0V630M1080 0V630"/>
  </g>
  <!-- Ambient glows -->
  <circle cx="1030" cy="120" r="320" fill="url(#glow)"/>
  <circle cx="140" cy="560" r="260" fill="url(#glow)" opacity="0.6"/>

  <!-- Logo mark -->
  <g transform="translate(96,86)">
    <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#indigo)" filter="url(#soft)"/>
    <!-- spark / hub glyph -->
    <path d="M32 16 L37 27 L48 32 L37 37 L32 48 L27 37 L16 32 L27 27 Z" fill="#fff" opacity="0.95"/>
    <circle cx="32" cy="32" r="4.5" fill="#c7d2fe"/>
  </g>
  <text x="176" y="118" fill="#ffffff" font-size="30" font-weight="700" letter-spacing="0.5">AI WorkHub</text>
  <text x="176" y="146" fill="#a5b4fc" font-size="16" font-weight="500" letter-spacing="1.5">AI-NATIVE PROJECT MANAGEMENT</text>

  <!-- Headline -->
  <text x="96" y="270" fill="#ffffff" font-size="62" font-weight="800" letter-spacing="-1">Manage projects by</text>
  <text x="96" y="342" font-size="62" font-weight="800" letter-spacing="-1" fill="url(#ai)">just talking to it.</text>

  <!-- Subhead -->
  <text x="96" y="398" fill="#c9c9d6" font-size="22" font-weight="400">An agentic AI copilot turns plain-English commands into real</text>
  <text x="96" y="428" fill="#c9c9d6" font-size="22" font-weight="400">actions on live data — Jira, reimagined.</text>

  <!-- Tech pills -->
  <g font-size="16" font-weight="600">
    <g transform="translate(96,470)">
      <rect width="118" height="40" rx="20" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="59" y="26" fill="#e5e7eb" text-anchor="middle">React 19</text>
    </g>
    <g transform="translate(226,470)">
      <rect width="150" height="40" rx="20" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="75" y="26" fill="#e5e7eb" text-anchor="middle">Spring Boot 3</text>
    </g>
    <g transform="translate(388,470)">
      <rect width="106" height="40" rx="20" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="53" y="26" fill="#e5e7eb" text-anchor="middle">Java 21</text>
    </g>
    <g transform="translate(506,470)">
      <rect width="100" height="40" rx="20" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="50" y="26" fill="#e5e7eb" text-anchor="middle">MySQL</text>
    </g>
    <g transform="translate(618,470)">
      <rect width="92" height="40" rx="20" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="46" y="26" fill="#e5e7eb" text-anchor="middle">Redis</text>
    </g>
    <g transform="translate(722,470)">
      <rect width="104" height="40" rx="20" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="52" y="26" fill="#e5e7eb" text-anchor="middle">Docker</text>
    </g>
  </g>

  <!-- Feature chips -->
  <g font-size="15" font-weight="500">
    <text x="96" y="556" fill="#8b8ba7">✦ Agentic AI commands</text>
    <text x="300" y="556" fill="#8b8ba7">✦ Multi-tenant orgs</text>
    <text x="486" y="556" fill="#8b8ba7">✦ JWT + Redis security</text>
    <text x="690" y="556" fill="#8b8ba7">✦ Kanban &amp; dashboards</text>
  </g>

  <!-- Right: mini app mockup -->
  <g transform="translate(830,180)" filter="url(#soft)">
    <rect width="290" height="290" rx="20" fill="#16162a" stroke="#ffffff" stroke-opacity="0.10"/>
    <!-- window dots -->
    <circle cx="24" cy="24" r="5" fill="#ef4444"/>
    <circle cx="42" cy="24" r="5" fill="#f59e0b"/>
    <circle cx="60" cy="24" r="5" fill="#22c55e"/>
    <!-- AI chat bubble -->
    <rect x="20" y="48" width="250" height="52" rx="12" fill="url(#ai)" opacity="0.18"/>
    <rect x="20" y="48" width="250" height="52" rx="12" fill="none" stroke="url(#ai)" stroke-opacity="0.5"/>
    <text x="34" y="70" fill="#e9d5ff" font-size="12" font-weight="600">You</text>
    <text x="34" y="90" fill="#e5e7eb" font-size="12.5">"Create a high-priority task in Website"</text>
    <!-- AI response -->
    <circle cx="30" cy="124" r="9" fill="url(#ai)"/>
    <text x="48" y="122" fill="#a5b4fc" font-size="11" font-weight="700">AI · executed</text>
    <text x="48" y="140" fill="#9ca3af" font-size="11.5">✓ Task created &amp; assigned</text>
    <!-- Kanban columns -->
    <g transform="translate(20,164)">
      <rect width="76" height="106" rx="10" fill="#0f0f1e"/>
      <rect width="76" height="106" rx="10" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="10" y="20" fill="#818cf8" font-size="10" font-weight="700">TO DO</text>
      <rect x="10" y="30" width="56" height="22" rx="6" fill="#4f46e5" fill-opacity="0.25"/>
      <rect x="10" y="58" width="56" height="22" rx="6" fill="#ffffff" fill-opacity="0.06"/>
    </g>
    <g transform="translate(107,164)">
      <rect width="76" height="106" rx="10" fill="#0f0f1e"/>
      <rect width="76" height="106" rx="10" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="10" y="20" fill="#f59e0b" font-size="10" font-weight="700">DOING</text>
      <rect x="10" y="30" width="56" height="22" rx="6" fill="#f59e0b" fill-opacity="0.22"/>
    </g>
    <g transform="translate(194,164)">
      <rect width="76" height="106" rx="10" fill="#0f0f1e"/>
      <rect width="76" height="106" rx="10" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="10" y="20" fill="#22c55e" font-size="10" font-weight="700">DONE</text>
      <rect x="10" y="30" width="56" height="22" rx="6" fill="#22c55e" fill-opacity="0.22"/>
      <rect x="10" y="58" width="56" height="22" rx="6" fill="#ffffff" fill-opacity="0.06"/>
    </g>
  </g>
</svg>
